<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CV DENT HAUS - Klinik Gigi Profesional</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />

    <!-- Font Awesome 6 (gratis) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <style>
        /* ===== RESET & BASE ===== */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0a6e79;
            --primary-dark: #08545d;
            --primary-light: #e6f4f6;
            --secondary: #f8b042;
            --secondary-dark: #d9942e;
            --text-dark: #1e2b37;
            --text-muted: #5a6d7a;
            --white: #ffffff;
            --gray-100: #f7f9fb;
            --gray-200: #e9edf2;
            --gray-300: #d1d9e0;
            --shadow-sm: 0 2px 8px rgba(10, 110, 121, 0.08);
            --shadow-md: 0 8px 30px rgba(10, 110, 121, 0.12);
            --shadow-lg: 0 20px 60px rgba(10, 110, 121, 0.15);
            --radius: 16px;
            --radius-sm: 8px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--text-dark);
            background: var(--white);
            line-height: 1.6;
            overflow-x: hidden;
        }

        a {
            text-decoration: none;
            color: inherit;
        }
        img {
            max-width: 100%;
            display: block;
        }
        ul {
            list-style: none;
        }
        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* ===== BUTTONS ===== */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 32px;
            font-weight: 600;
            font-size: 0.95rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: var(--transition);
            text-align: center;
            justify-content: center;
            font-family: inherit;
        }

        .btn-primary {
            background: var(--primary);
            color: var(--white);
            box-shadow: 0 4px 16px rgba(10, 110, 121, 0.3);
        }
        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(10, 110, 121, 0.35);
        }

        .btn-secondary {
            background: var(--secondary);
            color: var(--text-dark);
            box-shadow: 0 4px 16px rgba(248, 176, 66, 0.3);
        }
        .btn-secondary:hover {
            background: var(--secondary-dark);
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(248, 176, 66, 0.35);
        }

        .btn-outline {
            background: transparent;
            color: var(--white);
            border: 2px solid var(--white);
        }
        .btn-outline:hover {
            background: var(--white);
            color: var(--primary);
        }

        /* ===== NAVBAR ===== */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            padding: 16px 0;
            transition: var(--transition);
            background: transparent;
        }

        .navbar.scrolled {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(14px);
            box-shadow: var(--shadow-sm);
            padding: 10px 0;
        }

        .navbar .container {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 800;
            font-size: 1.6rem;
            color: var(--white);
            transition: var(--transition);
        }

        .navbar.scrolled .logo {
            color: var(--primary);
        }

        .logo-icon {
            width: 42px;
            height: 42px;
            background: var(--white);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            font-size: 1.2rem;
            font-weight: 800;
            transition: var(--transition);
        }

        .navbar.scrolled .logo-icon {
            background: var(--primary);
            color: var(--white);
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 32px;
        }

        .nav-links a {
            color: rgba(255, 255, 255, 0.85);
            font-weight: 500;
            font-size: 0.95rem;
            transition: var(--transition);
            position: relative;
        }

        .navbar.scrolled .nav-links a {
            color: var(--text-dark);
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--secondary);
            transition: var(--transition);
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .nav-links a:hover {
            color: var(--secondary);
        }

        .nav-cta {
            display: none;
        }

        .nav-cta .btn {
            padding: 10px 24px;
            font-size: 0.85rem;
        }

        /* Hamburger */
        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            padding: 4px;
            background: none;
            border: none;
        }

        .hamburger span {
            display: block;
            width: 28px;
            height: 3px;
            background: var(--white);
            border-radius: 3px;
            transition: var(--transition);
        }

        .navbar.scrolled .hamburger span {
            background: var(--text-dark);
        }

        .hamburger.active span:nth-child(1) {
            transform: rotate(45deg) translate(5px, 6px);
        }
        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }
        .hamburger.active span:nth-child(3) {
            transform: rotate(-45deg) translate(5px, -6px);
        }

        /* ===== HERO ===== */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            background: linear-gradient(135deg, #0a6e79 0%, #0b5a63 50%, #073e45 100%);
            position: relative;
            overflow: hidden;
            padding: 120px 0 80px;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -40%;
            right: -10%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(248, 176, 66, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        .hero::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.04) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        .hero .container {
            position: relative;
            z-index: 2;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
        }

        .hero-content h1 {
            font-size: 3.4rem;
            font-weight: 800;
            line-height: 1.1;
            color: var(--white);
            margin-bottom: 16px;
            letter-spacing: -0.02em;
        }

        .hero-content h1 span {
            color: var(--secondary);
            position: relative;
        }

        .hero-content p {
            font-size: 1.15rem;
            color: rgba(255, 255, 255, 0.8);
            max-width: 480px;
            margin-bottom: 32px;
            line-height: 1.8;
        }

        .hero-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
        }

        .hero-stats {
            display: flex;
            gap: 40px;
            margin-top: 48px;
            padding-top: 32px;
            border-top: 1px solid rgba(255, 255, 255, 0.15);
        }

        .hero-stats .stat h3 {
            font-size: 2rem;
            font-weight: 800;
            color: var(--secondary);
        }

        .hero-stats .stat p {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .hero-image {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .hero-image .illustration {
            width: 100%;
            max-width: 480px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: var(--radius);
            padding: 20px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: var(--shadow-lg);
        }

        .hero-image .illustration i {
            font-size: 8rem;
            color: rgba(255, 255, 255, 0.15);
            display: block;
            text-align: center;
            margin-bottom: 8px;
        }

        .hero-image .illustration .tooth-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            padding: 16px;
        }

        .hero-image .illustration .tooth-grid span {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 16px 8px;
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.7rem;
            font-weight: 500;
            transition: var(--transition);
            border: 1px solid transparent;
        }

        .hero-image .illustration .tooth-grid span i {
            font-size: 1.8rem;
            color: rgba(255, 255, 255, 0.3);
            margin-bottom: 4px;
            display: block;
        }

        .hero-image .illustration .tooth-grid span:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--secondary);
            color: var(--white);
        }

        .hero-image .illustration .tooth-grid span:hover i {
            color: var(--secondary);
        }

        /* ===== SECTION TITLES ===== */
        .section {
            padding: 80px 0;
        }

        .section-header {
            text-align: center;
            max-width: 640px;
            margin: 0 auto 56px;
        }

        .section-header .badge {
            display: inline-block;
            background: var(--primary-light);
            color: var(--primary);
            font-weight: 600;
            font-size: 0.8rem;
            padding: 6px 18px;
            border-radius: 50px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .section-header h2 {
            font-size: 2.6rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            color: var(--text-dark);
            margin-bottom: 12px;
        }

        .section-header h2 span {
            color: var(--primary);
        }

        .section-header p {
            color: var(--text-muted);
            font-size: 1.05rem;
        }

        .section-header.light h2 {
            color: var(--white);
        }

        .section-header.light p {
            color: rgba(255, 255, 255, 0.7);
        }

        .section-header.light .badge {
            background: rgba(255, 255, 255, 0.15);
            color: var(--white);
        }

        /* ===== ABOUT ===== */
        #about {
            background: var(--gray-100);
        }

        .about-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
        }

        .about-image {
            position: relative;
        }

        .about-image .card-image {
            background: var(--white);
            border-radius: var(--radius);
            padding: 40px 32px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--gray-200);
        }

        .about-image .card-image i {
            font-size: 3rem;
            color: var(--primary);
            margin-bottom: 16px;
        }

        .about-image .card-image h3 {
            font-size: 1.3rem;
            margin-bottom: 8px;
        }

        .about-image .card-image p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .about-image .floating-card {
            position: absolute;
            bottom: -20px;
            right: -20px;
            background: var(--secondary);
            color: var(--text-dark);
            padding: 20px 28px;
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            font-weight: 700;
            font-size: 1.1rem;
        }

        .about-image .floating-card small {
            display: block;
            font-weight: 400;
            font-size: 0.8rem;
            opacity: 0.7;
        }

        .about-text h3 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--text-dark);
        }

        .about-text h3 span {
            color: var(--primary);
        }

        .about-text p {
            color: var(--text-muted);
            margin-bottom: 16px;
            font-size: 1rem;
            line-height: 1.8;
        }

        .about-features {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-top: 24px;
        }

        .about-features li {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
            color: var(--text-dark);
        }

        .about-features li i {
            color: var(--secondary);
            font-size: 1.1rem;
        }

        /* ===== SERVICES ===== */
        #services {
            background: var(--white);
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
        }

        .service-card {
            background: var(--white);
            border-radius: var(--radius);
            padding: 40px 28px 32px;
            border: 1px solid var(--gray-200);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .service-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--primary);
            opacity: 0;
            transition: var(--transition);
        }

        .service-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-lg);
            border-color: transparent;
        }

        .service-card:hover::before {
            opacity: 1;
        }

        .service-card .icon {
            width: 60px;
            height: 60px;
            background: var(--primary-light);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: var(--primary);
            margin-bottom: 20px;
            transition: var(--transition);
        }

        .service-card:hover .icon {
            background: var(--primary);
            color: var(--white);
        }

        .service-card h4 {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .service-card p {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.7;
        }

        /* ===== WHY US ===== */
        #why-us {
            background: var(--primary);
            color: var(--white);
        }

        .why-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 30px;
        }

        .why-item {
            text-align: center;
            padding: 32px 20px;
            border-radius: var(--radius);
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: var(--transition);
        }

        .why-item:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateY(-4px);
        }

        .why-item .icon {
            font-size: 2.6rem;
            color: var(--secondary);
            margin-bottom: 16px;
            display: block;
        }

        .why-item h4 {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .why-item p {
            font-size: 0.9rem;
            opacity: 0.75;
            line-height: 1.6;
        }

        /* ===== TESTIMONIALS ===== */
        #testimonials {
            background: var(--gray-100);
        }

        .testimonials-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
        }

        .testimonial-card {
            background: var(--white);
            border-radius: var(--radius);
            padding: 32px 28px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--gray-200);
            transition: var(--transition);
        }

        .testimonial-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-4px);
        }

        .testimonial-card .stars {
            color: var(--secondary);
            margin-bottom: 12px;
            font-size: 1rem;
            letter-spacing: 2px;
        }

        .testimonial-card blockquote {
            font-size: 0.95rem;
            line-height: 1.7;
            color: var(--text-dark);
            margin-bottom: 16px;
            font-style: italic;
        }

        .testimonial-card .author {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .testimonial-card .author .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--primary-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: var(--primary);
            font-size: 1.1rem;
        }

        .testimonial-card .author .info h5 {
            font-weight: 700;
            font-size: 0.95rem;
        }

        .testimonial-card .author .info span {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* ===== CONTACT ===== */
        #contact {
            background: var(--white);
        }

        .contact-grid {
